# ── Server
server.port=8080

# ── MySQL  (CHANGE password to your MySQL root password)
spring.datasource.url=jdbc:mysql://localhost:3306/dittodb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CORS
app.cors.allowed-origins=http://localhost:3000

# ── Cookie
app.cookie.max-age-days=30

# ── JWT
app.jwt.secret=ditto-secret-key-change-in-production-must-be-32-chars-min
app.jwt.expiry-hours=720

# ── Email  (CHANGE to your Gmail + App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_16_CHAR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App
app.frontend.url=http://localhost:3000
app.email.from=YOUR_GMAIL@gmail.com
